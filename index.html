<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小小帝国式战场 - 第11步</title>
  <style>
    /* 让页面占满浏览器窗口，并使用深色背景 */
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111827;
      color: #e5e7eb;
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }

    .game-shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    /* canvas 居中显示，并加一点边框方便观察范围 */
    canvas {
      width: 900px;
      height: 600px;
      background: #0f172a;
      border: 1px solid #334155;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 900px;
      min-height: 44px;
    }

    button {
      min-width: 96px;
      height: 38px;
      border: 1px solid #475569;
      background: #1e293b;
      color: #e5e7eb;
      border-radius: 6px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
    }

    button:hover {
      background: #334155;
    }

    button.selected {
      border-color: #facc15;
      background: #854d0e;
      color: #fff7ed;
    }

    button.primary {
      border-color: #22c55e;
      background: #166534;
    }

    button.primary:hover {
      background: #15803d;
    }

    button.restart {
      border-color: #facc15;
      background: #854d0e;
    }

    button.restart:hover {
      background: #a16207;
    }

    .hidden {
      display: none;
    }

    .state-pill {
      min-width: 110px;
      color: #cbd5e1;
      font-size: 15px;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="game-shell">
    <!-- 游戏画布：内部绘制尺寸为 900 x 600 -->
    <canvas id="gameCanvas" width="900" height="600"></canvas>

    <div class="toolbar">
      <span id="stateLabel" class="state-pill">deploy</span>
      <button id="swordsmanButton" class="selected">剑士</button>
      <button id="archerButton">弓箭手</button>
      <button id="startBattleButton" class="primary">开始战斗</button>
      <button id="restartButton" class="restart hidden">重新开始</button>
    </div>
  </div>

  <script>
    // 获取 canvas 元素和 2D 绘图上下文
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const stateLabel = document.getElementById("stateLabel");
    const swordsmanButton = document.getElementById("swordsmanButton");
    const archerButton = document.getElementById("archerButton");
    const startBattleButton = document.getElementById("startBattleButton");
    const restartButton = document.getElementById("restartButton");

    // 游戏状态：deploy 表示布阵阶段，battle 表示战斗阶段，result 表示胜负已分。
    let gameState = "deploy";
    let resultMessage = "";

    // 当前选择的兵种，默认选择剑士。
    let selectedUnitType = "swordsman";

    // 记录上一帧的时间，用来计算 deltaTime
    let lastTime = performance.now();

    // 记录游戏从启动到现在运行了多久，单位：秒
    let runningTime = 0;

    // 当前帧率，方便在画面上显示调试信息
    let fps = 0;

    // 单独保存给 render 显示用的 deltaTime
    let deltaTimeForDisplay = 0;

    // 战场配置：6行 x 19列
    const battlefield = {
      rows: 6,
      cols: 19,
      playerStartCol: 0,
      playerEndCol: 8,
      separatorCol: 9,
      enemyStartCol: 10,
      enemyEndCol: 18,
      padding: 56
    };

    // 兵种配置。第10步开始处理自动攻击、扣血和死亡。
    const unitConfigs = {
      swordsman: {
        name: "剑士",
        type: "melee",
        hp: 120,
        attack: 20,
        speed: 40,
        attackRange: 1,
        attackCooldown: 0.8,
        attackRows: [0]
      },
      archer: {
        name: "弓箭手",
        type: "ranged",
        hp: 80,
        attack: 15,
        speed: 30,
        attackRange: 4,
        attackCooldown: 1.2,
        attackRows: [-1, 0, 1]
      }
    };

    // 鼠标当前所在位置和格子坐标
    const mouse = {
      x: 0,
      y: 0,
      grid: null
    };

    // 攻击特效列表，远程攻击会短暂画一条飞行线。
    let attackEffects = [];

    // 玩家布阵单位和敌方固定单位
    const playerUnits = [];
    let enemyUnits = createEnemyUnits();

    /**
     * 创建敌方固定布阵。
     *
     * @returns {object[]} 敌方单位列表
     */
    function createEnemyUnits() {
      return [
        createUnit("enemy", "swordsman", 16, 1),
        createUnit("enemy", "swordsman", 16, 4),
        createUnit("enemy", "archer", 14, 2),
        createUnit("enemy", "archer", 14, 3)
      ];
    }

    /**
     * 创建一个单位数据对象。
     *
     * @param {"player" | "enemy"} team 阵营
     * @param {"swordsman" | "archer"} unitType 兵种 key
     * @param {number} col 所在列
     * @param {number} row 所在行
     * @returns {object} 单位数据
     */
    function createUnit(team, unitType, col, row) {
      const config = unitConfigs[unitType];

      return {
        id: `${team}-${unitType}-${col}-${row}-${Date.now()}-${Math.random()}`,
        team,
        unitType,
        name: config.name,
        type: config.type,
        col,
        row,
        hp: config.hp,
        maxHp: config.hp,
        attack: config.attack,
        speed: config.speed,
        attackRange: config.attackRange,
        attackCooldown: config.attackCooldown,
        attackRows: config.attackRows,
        x: 0,
        y: 0,
        direction: team === "player" ? 1 : -1,
        hasReachedEnd: false,
        alive: true,
        target: null,
        attackTimer: 0,
        flashTimer: 0
      };
    }

    /**
     * 把单位当前格子坐标同步成像素坐标。
     * 进入 battle 阶段前会统一调用，保证单位从布阵格子的中心点出发。
     *
     * @param {object} unit 单位数据
     */
    function syncUnitPixelPosition(unit) {
      const position = gridToPixel(unit.col, unit.row);
      unit.x = position.x;
      unit.y = position.y;
    }

    /**
     * 初始化所有单位的像素位置。
     */
    function syncAllUnitPixelPositions() {
      for (const unit of getAllUnits()) {
        syncUnitPixelPosition(unit);
      }
    }

    /**
     * 根据 canvas 大小自动计算格子尺寸，并让战场居中。
     * 这里让格子保持正方形，所以取可用宽度和可用高度中较小的那个尺寸。
     */
    function updateBattlefieldLayout() {
      const availableWidth = canvas.width - battlefield.padding * 2;
      const availableHeight = canvas.height - battlefield.padding * 2;
      battlefield.tileSize = Math.floor(Math.min(
        availableWidth / battlefield.cols,
        availableHeight / battlefield.rows
      ));

      battlefield.width = battlefield.cols * battlefield.tileSize;
      battlefield.height = battlefield.rows * battlefield.tileSize;
      battlefield.offsetX = (canvas.width - battlefield.width) / 2;
      battlefield.offsetY = (canvas.height - battlefield.height) / 2;
    }

    /**
     * 网格坐标转像素坐标。
     * 返回的是这个格子的中心点像素位置。
     *
     * @param {number} col 第几列，从 0 开始
     * @param {number} row 第几行，从 0 开始
     * @returns {{x: number, y: number}} 像素中心点坐标
     */
    function gridToPixel(col, row) {
      return {
        x: battlefield.offsetX + col * battlefield.tileSize + battlefield.tileSize / 2,
        y: battlefield.offsetY + row * battlefield.tileSize + battlefield.tileSize / 2
      };
    }

    /**
     * 像素坐标转网格坐标。
     * 如果像素位置不在战场内，返回 null。
     *
     * @param {number} x canvas 内的像素 x 坐标
     * @param {number} y canvas 内的像素 y 坐标
     * @returns {{col: number, row: number} | null} 网格坐标
     */
    function pixelToGrid(x, y) {
      const localX = x - battlefield.offsetX;
      const localY = y - battlefield.offsetY;

      if (
        localX < 0 ||
        localY < 0 ||
        localX >= battlefield.width ||
        localY >= battlefield.height
      ) {
        return null;
      }

      return {
        col: Math.floor(localX / battlefield.tileSize),
        row: Math.floor(localY / battlefield.tileSize)
      };
    }

    /**
     * 判断某个格子是否在玩家布阵区。
     *
     * @param {number} col 列
     * @param {number} row 行
     * @returns {boolean} 是否可放置玩家单位
     */
    function isPlayerDeployCell(col, row) {
      return (
        row >= 0 &&
        row < battlefield.rows &&
        col >= battlefield.playerStartCol &&
        col <= battlefield.playerEndCol
      );
    }

    /**
     * 查找某个格子里是否已经有单位。
     *
     * @param {number} col 列
     * @param {number} row 行
     * @returns {object | undefined} 找到的单位
     */
    function getUnitAtGrid(col, row) {
      return getAllUnits().find(function (unit) {
        return unit.col === col && unit.row === row;
      });
    }

    /**
     * 获取全部单位，方便统一渲染和检查格子占用。
     *
     * @returns {object[]} 全部单位
     */
    function getAllUnits() {
      return playerUnits.concat(enemyUnits);
    }

    /**
     * 获取某个单位的敌方单位列表。
     *
     * @param {object} unit 当前单位
     * @returns {object[]} 敌方单位列表
     */
    function getEnemyUnitsFor(unit) {
      return unit.team === "player" ? enemyUnits : playerUnits;
    }

    // 监听鼠标移动，记录鼠标在 canvas 内的位置，并转换成网格坐标
    canvas.addEventListener("mousemove", function (event) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;

      mouse.x = (event.clientX - rect.left) * scaleX;
      mouse.y = (event.clientY - rect.top) * scaleY;
      mouse.grid = pixelToGrid(mouse.x, mouse.y);
    });

    // 鼠标离开 canvas 时，取消当前高亮
    canvas.addEventListener("mouseleave", function () {
      mouse.grid = null;
    });

    // deploy 阶段点击左侧布阵区：空格放兵，已有玩家单位则取消放置。
    canvas.addEventListener("click", function (event) {
      if (gameState !== "deploy") {
        return;
      }

      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const clickX = (event.clientX - rect.left) * scaleX;
      const clickY = (event.clientY - rect.top) * scaleY;
      const clickedGrid = pixelToGrid(clickX, clickY);

      if (!clickedGrid || !isPlayerDeployCell(clickedGrid.col, clickedGrid.row)) {
        return;
      }

      const existingPlayerIndex = playerUnits.findIndex(function (unit) {
        return unit.col === clickedGrid.col && unit.row === clickedGrid.row;
      });

      if (existingPlayerIndex >= 0) {
        playerUnits.splice(existingPlayerIndex, 1);
        return;
      }

      if (getUnitAtGrid(clickedGrid.col, clickedGrid.row)) {
        return;
      }

      const unit = createUnit("player", selectedUnitType, clickedGrid.col, clickedGrid.row);
      syncUnitPixelPosition(unit);
      playerUnits.push(unit);
    });

    swordsmanButton.addEventListener("click", function () {
      selectedUnitType = "swordsman";
      syncToolbar();
    });

    archerButton.addEventListener("click", function () {
      selectedUnitType = "archer";
      syncToolbar();
    });

    startBattleButton.addEventListener("click", function () {
      syncAllUnitPixelPositions();
      gameState = "battle";
      resultMessage = "";
      syncToolbar();
    });

    restartButton.addEventListener("click", function () {
      restartGame();
    });

    /**
     * 回到 deploy 阶段，清空玩家布阵并重置敌方单位。
     */
    function restartGame() {
      playerUnits.length = 0;
      enemyUnits = createEnemyUnits();
      attackEffects = [];
      gameState = "deploy";
      resultMessage = "";
      selectedUnitType = "swordsman";

      syncAllUnitPixelPositions();
      syncToolbar();
    }

    /**
     * 根据当前状态刷新底部按钮样式。
     */
    function syncToolbar() {
      swordsmanButton.classList.toggle("selected", selectedUnitType === "swordsman");
      archerButton.classList.toggle("selected", selectedUnitType === "archer");
      stateLabel.textContent = gameState;

      const isDeploy = gameState === "deploy";
      swordsmanButton.disabled = !isDeploy;
      archerButton.disabled = !isDeploy;
      startBattleButton.disabled = !isDeploy;
      restartButton.classList.toggle("hidden", gameState !== "result");
    }

    /**
     * update 用来更新游戏状态。
     * 第10步处理布阵后的移动、自动攻击和攻击特效。
     *
     * @param {number} deltaTime 距离上一帧过去了多少秒
     */
    function update(deltaTime) {
      runningTime += deltaTime;

      // FPS = 1秒 / 每帧耗时。
      // 这里做一个简单保护，避免 deltaTime 为 0 时出现异常。
      if (deltaTime > 0) {
        fps = 1 / deltaTime;
      }

      if (gameState === "battle") {
        updateBattle(deltaTime);
      }
    }

    /**
     * battle 阶段更新全部单位。
     * 有目标时停止移动并按冷却攻击；没有目标时继续向前移动。
     *
     * @param {number} deltaTime 距离上一帧过去了多少秒
     */
    function updateBattle(deltaTime) {
      for (const unit of getAllUnits()) {
        if (!unit.alive) {
          continue;
        }

        unit.attackTimer = Math.max(0, unit.attackTimer - deltaTime);
        unit.flashTimer = Math.max(0, unit.flashTimer - deltaTime);

        if (!isTargetValid(unit, unit.target)) {
          unit.target = findTargetForUnit(unit);
        }

        if (unit.target && isTargetValid(unit, unit.target)) {
          attackTarget(unit, unit.target);
          continue;
        }

        updateUnitMovement(unit, deltaTime);
      }

      updateAttackEffects(deltaTime);
      removeDeadUnits(playerUnits);
      removeDeadUnits(enemyUnits);
      checkBattleResult();
    }

    /**
     * battle 阶段检查双方是否还有存活单位。
     * 一方全部死亡后进入 result 阶段，后续 update 不再驱动行动。
     */
    function checkBattleResult() {
      const hasLivingPlayer = playerUnits.some(function (unit) {
        return unit.alive;
      });
      const hasLivingEnemy = enemyUnits.some(function (unit) {
        return unit.alive;
      });

      if (!hasLivingEnemy) {
        gameState = "result";
        resultMessage = "胜利";
        clearAllTargets();
        syncToolbar();
        return;
      }

      if (!hasLivingPlayer) {
        gameState = "result";
        resultMessage = "失败";
        clearAllTargets();
        syncToolbar();
      }
    }

    /**
     * 胜负已分时清空所有目标，避免 result 阶段还显示攻击连线。
     */
    function clearAllTargets() {
      for (const unit of getAllUnits()) {
        unit.target = null;
      }

      attackEffects = [];
    }

    /**
     * 从单位数组中移除死亡单位。
     *
     * @param {object[]} units 单位数组
     */
    function removeDeadUnits(units) {
      for (let i = units.length - 1; i >= 0; i--) {
        if (!units[i].alive) {
          units.splice(i, 1);
        }
      }
    }

    /**
     * 没有目标时，单位沿所在行水平前进。
     *
     * @param {object} unit 单位数据
     * @param {number} deltaTime 距离上一帧过去了多少秒
     */
    function updateUnitMovement(unit, deltaTime) {
      if (unit.hasReachedEnd) {
        return;
      }

      const endCol = unit.team === "player"
        ? battlefield.enemyEndCol
        : battlefield.playerStartCol;
      const endX = gridToPixel(endCol, unit.row).x;
      const moveDistance = unit.speed * deltaTime * unit.direction;

      unit.x += moveDistance;

      if (unit.team === "player" && unit.x >= endX) {
        unit.x = endX;
        unit.hasReachedEnd = true;
      }

      if (unit.team === "enemy" && unit.x <= endX) {
        unit.x = endX;
        unit.hasReachedEnd = true;
      }

      const currentGrid = pixelToGrid(unit.x, unit.y);
      if (currentGrid) {
        unit.col = currentGrid.col;
        unit.row = currentGrid.row;
      }
    }

    /**
     * 判断目标是否仍然有效：存活、敌方、行范围符合、横向距离仍在攻击范围内。
     *
     * @param {object} unit 攻击者
     * @param {object | null} target 当前目标
     * @returns {boolean} 目标是否有效
     */
    function isTargetValid(unit, target) {
      if (!target || !target.alive || target.team === unit.team) {
        return false;
      }

      const rowOffset = target.row - unit.row;
      if (!unit.attackRows.includes(rowOffset)) {
        return false;
      }

      return getHorizontalDistanceInTiles(unit, target) <= unit.attackRange;
    }

    /**
     * 单位攻击目标。只有 attackTimer 为 0 时才真正造成伤害。
     *
     * @param {object} attacker 攻击者
     * @param {object} target 目标
     */
    function attackTarget(attacker, target) {
      if (attacker.attackTimer > 0) {
        return;
      }

      attacker.attackTimer = attacker.attackCooldown;
      target.hp -= attacker.attack;
      target.flashTimer = 0.16;

      if (attacker.type === "ranged") {
        attackEffects.push({
          fromX: attacker.x,
          fromY: attacker.y,
          toX: target.x,
          toY: target.y,
          timeLeft: 0.18,
          duration: 0.18
        });
      }

      if (target.hp <= 0) {
        target.hp = 0;
        target.alive = false;
        target.target = null;

        for (const unit of getAllUnits()) {
          if (unit.target === target) {
            unit.target = null;
          }
        }
      }
    }

    /**
     * 为单位寻找当前可攻击目标。
     * 目标必须是敌方、存活、行范围符合 attackRows，并且横向距离进入 attackRange。
     *
     * @param {object} unit 当前单位
     * @returns {object | null} 找到的最近目标
     */
    function findTargetForUnit(unit) {
      let nearestTarget = null;
      let nearestDistance = Infinity;

      for (const target of getEnemyUnitsFor(unit)) {
        if (!isTargetValid(unit, target)) {
          continue;
        }

        const horizontalDistanceInTiles = getHorizontalDistanceInTiles(unit, target);
        if (horizontalDistanceInTiles < nearestDistance) {
          nearestDistance = horizontalDistanceInTiles;
          nearestTarget = target;
        }
      }

      return nearestTarget;
    }

    /**
     * 计算两个单位的横向距离，单位是格子数。
     *
     * @param {object} unitA 第一个单位
     * @param {object} unitB 第二个单位
     * @returns {number} 横向距离，单位：格子
     */
    function getHorizontalDistanceInTiles(unitA, unitB) {
      return Math.abs(unitA.x - unitB.x) / battlefield.tileSize;
    }

    /**
     * 更新远程攻击线特效。
     *
     * @param {number} deltaTime 距离上一帧过去了多少秒
     */
    function updateAttackEffects(deltaTime) {
      for (const effect of attackEffects) {
        effect.timeLeft -= deltaTime;
      }

      attackEffects = attackEffects.filter(function (effect) {
        return effect.timeLeft > 0;
      });
    }

    /**
     * render 用来绘制画面。
     * 注意：每一帧都应该先清屏，再绘制最新画面。
     *
     * @param {CanvasRenderingContext2D} context canvas 的 2D 绘图上下文
     */
    function render(context) {
      // 清屏：擦掉上一帧的内容
      context.clearRect(0, 0, canvas.width, canvas.height);

      // 绘制深色背景，让清屏效果更明显
      context.fillStyle = "#0f172a";
      context.fillRect(0, 0, canvas.width, canvas.height);

      drawBattlefield(context);
      drawTargetLines(context);
      drawAttackEffects(context);
      drawUnits(context);
      drawResultOverlay(context);
      drawDebugInfo(context);
    }

    /**
     * 绘制小小帝国式横向战场。
     *
     * @param {CanvasRenderingContext2D} context canvas 的 2D 绘图上下文
     */
    function drawBattlefield(context) {
      drawArea(
        context,
        battlefield.playerStartCol,
        battlefield.playerEndCol,
        "rgba(59, 130, 246, 0.20)"
      );

      drawArea(
        context,
        battlefield.separatorCol,
        battlefield.separatorCol,
        "rgba(15, 23, 42, 0.92)"
      );

      drawArea(
        context,
        battlefield.enemyStartCol,
        battlefield.enemyEndCol,
        "rgba(239, 68, 68, 0.20)"
      );

      // 鼠标在战场内时，高亮当前格子
      if (mouse.grid) {
        const tileX = battlefield.offsetX + mouse.grid.col * battlefield.tileSize;
        const tileY = battlefield.offsetY + mouse.grid.row * battlefield.tileSize;
        const isDeployCell = isPlayerDeployCell(mouse.grid.col, mouse.grid.row);

        context.fillStyle = isDeployCell
          ? "rgba(250, 204, 21, 0.34)"
          : "rgba(148, 163, 184, 0.22)";
        context.fillRect(tileX, tileY, battlefield.tileSize, battlefield.tileSize);
      }

      drawGridLines(context);
      drawBattlefieldLabels(context);
    }

    /**
     * 绘制某一段列区域。
     *
     * @param {CanvasRenderingContext2D} context canvas 的 2D 绘图上下文
     * @param {number} startCol 开始列
     * @param {number} endCol 结束列
     * @param {string} color 填充颜色
     */
    function drawArea(context, startCol, endCol, color) {
      const x = battlefield.offsetX + startCol * battlefield.tileSize;
      const width = (endCol - startCol + 1) * battlefield.tileSize;

      context.fillStyle = color;
      context.fillRect(x, battlefield.offsetY, width, battlefield.height);
    }

    /**
     * 绘制战场网格线和外框。
     *
     * @param {CanvasRenderingContext2D} context canvas 的 2D 绘图上下文
     */
    function drawGridLines(context) {
      context.strokeStyle = "#475569";
      context.lineWidth = 1;

      for (let col = 0; col <= battlefield.cols; col++) {
        const x = battlefield.offsetX + col * battlefield.tileSize;
        context.beginPath();
        context.moveTo(x, battlefield.offsetY);
        context.lineTo(x, battlefield.offsetY + battlefield.height);
        context.stroke();
      }

      for (let row = 0; row <= battlefield.rows; row++) {
        const y = battlefield.offsetY + row * battlefield.tileSize;
        context.beginPath();
        context.moveTo(battlefield.offsetX, y);
        context.lineTo(battlefield.offsetX + battlefield.width, y);
        context.stroke();
      }

      // 加粗隔离列左右边界，让中线更明确
      context.strokeStyle = "#cbd5e1";
      context.lineWidth = 2;
      const separatorLeft = battlefield.offsetX + battlefield.separatorCol * battlefield.tileSize;
      const separatorRight = separatorLeft + battlefield.tileSize;

      context.beginPath();
      context.moveTo(separatorLeft, battlefield.offsetY);
      context.lineTo(separatorLeft, battlefield.offsetY + battlefield.height);
      context.stroke();

      context.beginPath();
      context.moveTo(separatorRight, battlefield.offsetY);
      context.lineTo(separatorRight, battlefield.offsetY + battlefield.height);
      context.stroke();

      // 绘制战场外框
      context.strokeStyle = "#94a3b8";
      context.lineWidth = 2;
      context.strokeRect(
        battlefield.offsetX,
        battlefield.offsetY,
        battlefield.width,
        battlefield.height
      );
    }

    /**
     * 绘制区域标签，帮助确认左右布阵区和中间隔离列。
     *
     * @param {CanvasRenderingContext2D} context canvas 的 2D 绘图上下文
     */
    function drawBattlefieldLabels(context) {
      context.textAlign = "center";
      context.textBaseline = "bottom";
      context.font = "15px Arial, Microsoft YaHei, sans-serif";

      const labelY = battlefield.offsetY - 10;
      const playerCenterX = battlefield.offsetX + 4.5 * battlefield.tileSize;
      const separatorCenterX = battlefield.offsetX + 9.5 * battlefield.tileSize;
      const enemyCenterX = battlefield.offsetX + 14.5 * battlefield.tileSize;

      context.fillStyle = "#93c5fd";
      context.fillText("玩家布阵区 6x9", playerCenterX, labelY);

      context.fillStyle = "#cbd5e1";
      context.fillText("隔离列", separatorCenterX, labelY);

      context.fillStyle = "#fca5a5";
      context.fillText("敌人布阵区 6x9", enemyCenterX, labelY);

      context.textAlign = "left";
      context.textBaseline = "alphabetic";
    }

    /**
     * 绘制玩家和敌方单位。
     *
     * @param {CanvasRenderingContext2D} context canvas 的 2D 绘图上下文
     */
    function drawUnits(context) {
      for (const unit of enemyUnits) {
        if (!unit.alive) {
          continue;
        }

        drawUnit(context, unit);
      }

      for (const unit of playerUnits) {
        if (!unit.alive) {
          continue;
        }

        drawUnit(context, unit);
      }
    }

    /**
     * 绘制单位当前锁定目标的黄色连线。
     *
     * @param {CanvasRenderingContext2D} context canvas 的 2D 绘图上下文
     */
    function drawTargetLines(context) {
      if (gameState !== "battle") {
        return;
      }

      context.strokeStyle = "rgba(250, 204, 21, 0.75)";
      context.lineWidth = 3;

      for (const unit of getAllUnits()) {
        if (!unit.alive || !unit.target || !unit.target.alive) {
          continue;
        }

        context.beginPath();
        context.moveTo(unit.x, unit.y);
        context.lineTo(unit.target.x, unit.target.y);
        context.stroke();
      }
    }

    /**
     * 绘制远程攻击的短暂飞行线。
     *
     * @param {CanvasRenderingContext2D} context canvas 的 2D 绘图上下文
     */
    function drawAttackEffects(context) {
      for (const effect of attackEffects) {
        const alpha = effect.timeLeft / effect.duration;

        context.strokeStyle = `rgba(250, 204, 21, ${alpha})`;
        context.lineWidth = 4;
        context.beginPath();
        context.moveTo(effect.fromX, effect.fromY);
        context.lineTo(effect.toX, effect.toY);
        context.stroke();
      }
    }

    /**
     * 绘制单个单位。
     *
     * @param {CanvasRenderingContext2D} context canvas 的 2D 绘图上下文
     * @param {object} unit 单位数据
     */
    function drawUnit(context, unit) {
      const center = gameState === "deploy"
        ? gridToPixel(unit.col, unit.row)
        : { x: unit.x, y: unit.y };
      const radius = battlefield.tileSize * 0.32;
      const hpBarWidth = battlefield.tileSize * 0.72;
      const hpBarHeight = 5;
      const hpPercent = Math.max(0, unit.hp / unit.maxHp);

      if (unit.flashTimer > 0) {
        context.fillStyle = "#fef3c7";
      } else {
        context.fillStyle = unit.team === "player" ? "#3b82f6" : "#ef4444";
      }
      context.beginPath();
      context.arc(center.x, center.y, radius, 0, Math.PI * 2);
      context.fill();

      context.strokeStyle = unit.type === "melee" ? "#e2e8f0" : "#facc15";
      context.lineWidth = 2;
      context.stroke();

      if (isCurrentTarget(unit)) {
        context.strokeStyle = "#facc15";
        context.lineWidth = 4;
        context.beginPath();
        context.arc(center.x, center.y, radius + 5, 0, Math.PI * 2);
        context.stroke();
      }

      const hpBarX = center.x - hpBarWidth / 2;
      const hpBarY = center.y - radius - 11;
      context.fillStyle = "#1f2937";
      context.fillRect(hpBarX, hpBarY, hpBarWidth, hpBarHeight);

      context.fillStyle = "#22c55e";
      context.fillRect(hpBarX, hpBarY, hpBarWidth * hpPercent, hpBarHeight);

      context.strokeStyle = "#cbd5e1";
      context.lineWidth = 1;
      context.strokeRect(hpBarX, hpBarY, hpBarWidth, hpBarHeight);

      context.fillStyle = "#f8fafc";
      context.font = "12px Arial, Microsoft YaHei, sans-serif";
      context.textAlign = "center";
      context.textBaseline = "middle";
      context.fillText(unit.type === "melee" ? "剑" : "弓", center.x, center.y);

      context.fillStyle = "#cbd5e1";
      context.font = "11px Arial, Microsoft YaHei, sans-serif";
      context.textBaseline = "top";
      context.fillText(unit.name, center.x, center.y + radius + 3);

      context.textAlign = "left";
      context.textBaseline = "alphabetic";
    }

    /**
     * 判断单位是否正在被任何敌方单位锁定。
     *
     * @param {object} unit 单位数据
     * @returns {boolean} 是否为当前目标
     */
    function isCurrentTarget(unit) {
      return getAllUnits().some(function (attacker) {
        return attacker.alive && attacker.target === unit && unit.alive;
      });
    }

    /**
     * result 阶段绘制胜负结果。
     *
     * @param {CanvasRenderingContext2D} context canvas 的 2D 绘图上下文
     */
    function drawResultOverlay(context) {
      if (gameState !== "result") {
        return;
      }

      context.fillStyle = "rgba(15, 23, 42, 0.68)";
      context.fillRect(0, 0, canvas.width, canvas.height);

      context.textAlign = "center";
      context.textBaseline = "middle";
      context.font = "48px Arial, Microsoft YaHei, sans-serif";
      context.fillStyle = resultMessage === "胜利" ? "#22c55e" : "#ef4444";
      context.fillText(resultMessage, canvas.width / 2, canvas.height / 2);

      context.font = "18px Arial, Microsoft YaHei, sans-serif";
      context.fillStyle = "#e5e7eb";
      context.fillText("点击下方“重新开始”返回布阵阶段", canvas.width / 2, canvas.height / 2 + 48);

      context.textAlign = "left";
      context.textBaseline = "alphabetic";
    }

    /**
     * 绘制标题、FPS、deltaTime、运行时间和鼠标所在格子。
     *
     * @param {CanvasRenderingContext2D} context canvas 的 2D 绘图上下文
     */
    function drawDebugInfo(context) {
      context.fillStyle = "#f8fafc";
      context.font = "20px Arial, Microsoft YaHei, sans-serif";
      context.fillText("胜负判断 - 第11步", 24, 32);

      context.font = "16px Consolas, Microsoft YaHei, monospace";
      context.fillStyle = "#38bdf8";
      context.fillText(`FPS: ${fps.toFixed(1)}`, 640, 18);
      context.fillText(`deltaTime: ${deltaTimeForDisplay.toFixed(4)} 秒`, 640, 37);
      context.fillText(`当前运行时间: ${runningTime.toFixed(2)} 秒`, 640, 56);

      context.fillStyle = "#facc15";
      if (mouse.grid) {
        context.fillText(`grid: (${mouse.grid.col}, ${mouse.grid.row})`, 24, 58);
      } else {
        context.fillText("grid: (-, -)", 24, 58);
      }

      context.fillStyle = "#cbd5e1";
      context.fillText(`state: ${gameState}`, 24, 80);
      context.fillText(`selected: ${unitConfigs[selectedUnitType].name}`, 24, 102);

      if (resultMessage) {
        context.fillStyle = "#facc15";
        context.fillText(`result: ${resultMessage}`, 24, 124);
      }
    }

    /**
     * gameLoop 是游戏循环。
     * 浏览器每准备好绘制下一帧时，会通过 requestAnimationFrame 调用它。
     *
     * @param {number} currentTime 当前时间，单位：毫秒
     */
    function gameLoop(currentTime) {
      // deltaTime 表示这一帧和上一帧之间经过了多少秒
      const deltaTime = (currentTime - lastTime) / 1000;
      lastTime = currentTime;
      deltaTimeForDisplay = deltaTime;

      update(deltaTime);
      render(ctx);

      // 请求浏览器在下一帧继续调用 gameLoop
      requestAnimationFrame(gameLoop);
    }

    updateBattlefieldLayout();
    syncAllUnitPixelPositions();
    syncToolbar();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
